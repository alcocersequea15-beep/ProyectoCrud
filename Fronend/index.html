<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,50..200" />
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <title>Gestor de contraseñas</title>
</head>
<body style="background-color:rgb(247, 249, 252)">
    <div id="main" class="container">
        <div id="macro" class="container my-5 text-center">
            <h1>Gestor de contraseñas</h1>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Plataforma</th>
                        <th scope="col">Usuario</th>
                        <th scope="col">Contraseña</th>
                        <th scope="col">Editar</th>
                        <th scope="col">Eliminar</th>
                    </tr>
                </thead>
                <tbody id="data">
                    
                </tbody>
            </table>
            <button type='button' class='btn btn-primary' onclick="abrirModal()">
                <img src='imagenes/agregar-usuario.png' height = '30' width='30'/>Agregar</button>
            </div>
            
    <div id="overlay" onclick="cerrarModal()"></div>
    <div id="modal">
        <div id="marco" class="text-center">
            <h1>Gestor de contraseñas: Agregar</h1>
            <div class="form-group">
                <label for="plataforma">Plataforma:</label>
                <input type="text" class="form-control" name="plataforma" id="plataforma" placeholder="plataforma">
            </div>
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" class="form-control" name="usuario" id="usuario" placeholder="usuario">
            </div>
            <div class="form-group">
                <label for="clave">Clave:</label>
                <input type="password" class="form-control" name="clave" id="clave" placeholder="clave">
            </div>
            <div class="tarjeta">
                <button type="button" class="btn btn-info" onclick="registrar()"> 
                    <img src="imagenes/guardar-el-archivo.png" height="30" width="30"/>Guardar
                </button>
                <button type="button" class="btn btn-warning" onclick="location.href = 'index.html'"> 
                    <img src="imagenes/regresa.png" height="30" width="30"/>Regresar
                </button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        consulta_general();
        </script>
    </div>
</body>
</html>
