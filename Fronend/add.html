<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2/dist/sweetalert.min.js"></script>
    <script src="app.js"></script>
    <title>Gestor de contraseñas</title>
</head>
<body style="background-color:rgb(172, 197, 230)">
    <div class="container">
        <div id="marco" class="container my-5 text-center">
            <h1>Gestor de contraseñas: Agregar</h1>
            <div class="form-group">
                <label for="plataforma">Plataforma:</label>
                <input type="text" class="form-control" name="plataforma" id="plataforma" placeholder="plataforma">
            </div>
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" class="form-control" name="usuario" id="usuario" placeholder="usuario">
            </div>
            <div class="form-group">
                <label for="clave">Clave:</label>
                <input type="password" class="form-control" name="clave" id="clave" placeholder="clave">
            </div>
            <div class="tarjeta">
                <button type="button" class="btn btn-info" onclick="registrar()"> 
                    <img src="imagenes/salvar.png" height="30" width="30"/>Guardar
                </button>
                <button type="button" class="btn btn-warning" onclick="location.href = 'index.html'"> 
                    <img src="imagenes/atras.png" height="30" width="30"/>Regresar
                </button>
            </div>
        </div>
    </div>
</body>
</html>
